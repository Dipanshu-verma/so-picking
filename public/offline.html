<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — SO Picking App</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 360px;
        width: 100%;
      }
      .icon {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg {
        width: 48px;
        height: 48px;
        color: #94a3b8;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        min-height: 56px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover { background: #1d4ed8; }
      .btn:active { transform: scale(0.97); }
      .note {
        margin-top: 16px;
        font-size: 13px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2" color="#94a3b8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072
                   M6.343 17.657a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072
                   M12 12h.01" />
        </svg>
      </div>
      <h1>You&apos;re Offline</h1>
      <p>
        No internet connection detected.<br />
        If you were in the middle of picking,
        your progress is saved locally and will sync when you reconnect.
      </p>
      <button class="btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9
                   m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Try Again
      </button>
      <p class="note">SO Picking App · Warehouse Edition</p>
    </div>
  </body>
</html>
